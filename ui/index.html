<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ciafx</title>
<meta name="description" content="Real-time video-to-particle renderer by Ciamac Parhizi">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Upload overlay (positioned relative to panel state) -->
<div id="upload-overlay">
  <div id="upload-inner">
    <div id="upload-area">
      <div class="upload-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="upload-brand">cia<span>fx</span></div>
      <div class="upload-label">drop video</div>
      <div class="upload-hint">mp4, webm, mov</div>
      <input type="file" id="file-input" accept="video/*">
    </div>
  </div>
</div>

<!-- Controls panel -->
<div id="controls">
  <div id="controls-header">
    <h2>ciafx</h2>
    <span class="subtitle">by ciamac</span>
  </div>
  <div id="controls-body"></div>
</div>
<div id="ctrl-toggle"><div class="arrow"></div></div>

<!-- Status bar -->
<div id="status">
  <span id="fps-display">-- fps</span>
  <span id="particle-count">--</span>
</div>

<!-- Keyboard hints -->
<div id="kb-hint">space pause / r record / esc panel</div>

<script type="module" src="app.js"></script>
</body>
</html>
