name: Build Pointfield

on:
  push:
    tags:
      - 'v*'
      - 'pixelcluster-v*'
      - 'pointfield-v*'
  workflow_dispatch:

# macOS signing + notarization is driven by repository secrets, read into the
# build job's env. When they are ABSENT every value is empty and Tauri produces
# an UNSIGNED build (the historical behavior). When they are PRESENT, Tauri
# imports the cert, signs with the Developer ID + hardened runtime, notarizes,
# and staples during `cargo tauri build`, and a versionless Pointfield-macOS.dmg
# is attached so download links can target releases/latest/download forever.
#
# Secrets (Settings > Secrets and variables > Actions):
#   APPLE_CERTIFICATE            base64 of the Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD   the .p12 password
#   APPLE_SIGNING_IDENTITY       Developer ID Application: ciamac parhizi (3AUT8DTWP3)
#   APPLE_ID                     Apple ID email used for notarization
#   APPLE_PASSWORD               app-specific password for that Apple ID
#   APPLE_TEAM_ID                3AUT8DTWP3

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build
        run: cargo tauri build
        working-directory: .

      # Versionless copies so the site can link to a stable URL forever.
      # Windows installers are unsigned either way (no change in trust posture).
      - name: Stable-named Windows installers
        shell: bash
        run: |
          set -euo pipefail
          msi=$(ls src-tauri/target/release/bundle/msi/*.msi | head -1)
          exe=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)
          cp "$msi" "src-tauri/target/release/bundle/msi/Pointfield-Windows.msi"
          cp "$exe" "src-tauri/target/release/bundle/nsis/Pointfield-Windows-setup.exe"

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: pointfield-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: pointfield-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-mac-arm:
    runs-on: macos-14
    env:
      # All empty unless the secrets exist. Empty => Tauri builds unsigned
      # (status quo). Present => Tauri imports the cert, signs (hardened runtime),
      # notarizes, and staples during the build.
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build (signs + notarizes when secrets are present)
        run: cargo tauri build --target aarch64-apple-darwin

      # Versionless copy, signed builds only: never let a stable URL serve an
      # unsigned (Gatekeeper "damaged") DMG. env context is allowed in `if`;
      # the `secrets` context is NOT, so we gate on env.APPLE_CERTIFICATE.
      - name: Stable-named DMG (signed builds only)
        if: env.APPLE_CERTIFICATE != ''
        run: |
          set -euo pipefail
          dmg=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$dmg" "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Pointfield-macOS.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: pointfield-mac-arm-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: pointfield-mac-arm-app
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

  release:
    needs: [build-windows, build-mac-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pointfield-windows-msi/*
            pointfield-windows-exe/*
            pointfield-mac-arm-dmg/*
          draft: true
