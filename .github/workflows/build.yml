name: Build ciafx

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build
        run: cargo tauri build
        working-directory: .

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: ciafx-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: ciafx-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-mac-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ciafx-mac-arm-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: ciafx-mac-arm-app
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

  release:
    needs: [build-windows, build-mac-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ciafx-windows-msi/*
            ciafx-windows-exe/*
            ciafx-mac-arm-dmg/*
          draft: true
