<?xml version="1.0" encoding="UTF-8"?>
<!--
  PixelCluster — Diagram 1: "Frame → sampling grid → point clusters"
  16:9 master, v1 (2026-05-29). Per spec: launch/diagram-1_frame-grid-clusters_spec_v1.md
  Teaching variant, true source colors. Reference frame 1920x1080 (technical annotation only).
  Build artifact — not published, not on the public site.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <defs>
    <!-- Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8fb5e8"/>
    </marker>

    <!-- Teaching source frame (local 440 x 248): large, obvious color regions -->
    <g id="teach">
      <rect x="0" y="0" width="440" height="248" fill="#2f8fd6"/>            <!-- sky -->
      <rect x="0" y="150" width="440" height="98" fill="#3aa85a"/>          <!-- ground -->
      <circle cx="92" cy="66" r="40" fill="#f3c33b"/>                       <!-- sun -->
      <rect x="178" y="104" width="64" height="86" fill="#8a4fd0"/>         <!-- purple tower -->
      <rect x="300" y="78" width="86" height="112" fill="#d8493a"/>         <!-- red building -->
    </g>

    <!-- Per-region dot patterns for Panel 3 (point-field representation) -->
    <pattern id="dSky"    patternUnits="userSpaceOnUse" width="12" height="12"><circle cx="6" cy="6" r="3.1" fill="#2f8fd6"/></pattern>
    <pattern id="dGround" patternUnits="userSpaceOnUse" width="12" height="12"><circle cx="6" cy="6" r="3.1" fill="#3aa85a"/></pattern>
    <pattern id="dSun"    patternUnits="userSpaceOnUse" width="12" height="12"><circle cx="6" cy="6" r="3.1" fill="#f3c33b"/></pattern>
    <pattern id="dPurple" patternUnits="userSpaceOnUse" width="12" height="12"><circle cx="6" cy="6" r="3.1" fill="#8a4fd0"/></pattern>
    <pattern id="dRed"    patternUnits="userSpaceOnUse" width="12" height="12"><circle cx="6" cy="6" r="3.1" fill="#d8493a"/></pattern>

    <!-- soft glow for the point-field panel -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="1600" height="900" fill="#0a0a0b"/>

  <!-- Kicker + headline -->
  <text x="64" y="66" fill="#6b665e" font-size="14" letter-spacing="3" font-family="ui-monospace,'SF Mono',Menlo,monospace">PIXELCLUSTER — HOW IT WORKS</text>
  <text x="64" y="150" fill="#ece8df" font-size="46" font-weight="200" letter-spacing="-1.5">Frame to point clusters</text>
  <text x="64" y="192" fill="#9a948a" font-size="20" font-weight="300">A sampling grid reads each region of a frame, then spawns a small cluster of points that share its color.</text>

  <!-- ============================ PANEL 1: source frame ============================ -->
  <svg x="64" y="250" width="440" height="248" viewBox="0 0 440 248">
    <use href="#teach"/>
    <!-- carried highlighted region -->
    <rect x="330" y="106.3" width="36.7" height="35.4" fill="none" stroke="#78b4ff" stroke-width="2.5"/>
  </svg>
  <rect x="64" y="250" width="440" height="248" fill="none" stroke="#2a2a30" stroke-width="1.5"/>

  <!-- arrow 1 -->
  <line x1="516" y1="374" x2="566" y2="374" stroke="#8fb5e8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="541" y="362" fill="#6b665e" font-size="13" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace">sample</text>

  <!-- ============================ PANEL 2: sampling grid ============================ -->
  <svg x="580" y="250" width="440" height="248" viewBox="0 0 440 248">
    <use href="#teach"/>
    <rect x="0" y="0" width="440" height="248" fill="#0a0a0b" opacity="0.28"/>
    <!-- illustrative grid (NOT the literal 417x235) -->
    <g stroke="#cdd6e0" stroke-width="0.8" opacity="0.4">
      <line x1="36.7" y1="0" x2="36.7" y2="248"/><line x1="73.3" y1="0" x2="73.3" y2="248"/>
      <line x1="110" y1="0" x2="110" y2="248"/><line x1="146.7" y1="0" x2="146.7" y2="248"/>
      <line x1="183.3" y1="0" x2="183.3" y2="248"/><line x1="220" y1="0" x2="220" y2="248"/>
      <line x1="256.7" y1="0" x2="256.7" y2="248"/><line x1="293.3" y1="0" x2="293.3" y2="248"/>
      <line x1="330" y1="0" x2="330" y2="248"/><line x1="366.7" y1="0" x2="366.7" y2="248"/>
      <line x1="403.3" y1="0" x2="403.3" y2="248"/>
      <line x1="0" y1="35.4" x2="440" y2="35.4"/><line x1="0" y1="70.9" x2="440" y2="70.9"/>
      <line x1="0" y1="106.3" x2="440" y2="106.3"/><line x1="0" y1="141.7" x2="440" y2="141.7"/>
      <line x1="0" y1="177.1" x2="440" y2="177.1"/><line x1="0" y1="212.6" x2="440" y2="212.6"/>
    </g>
    <!-- carried highlighted region -->
    <rect x="330" y="106.3" width="36.7" height="35.4" fill="#78b4ff" fill-opacity="0.12" stroke="#78b4ff" stroke-width="2.5"/>
  </svg>
  <rect x="580" y="250" width="440" height="248" fill="none" stroke="#2a2a30" stroke-width="1.5"/>

  <!-- arrow 2 -->
  <line x1="1032" y1="374" x2="1082" y2="374" stroke="#8fb5e8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1057" y="362" fill="#6b665e" font-size="13" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace">spawn</text>

  <!-- ============================ PANEL 3: point clusters ============================ -->
  <svg x="1096" y="250" width="440" height="248" viewBox="0 0 440 248">
    <rect x="0" y="0" width="440" height="248" fill="#0a0a0b"/>
    <g filter="url(#soft)">
      <rect x="0" y="0" width="440" height="248" fill="url(#dSky)"/>
      <rect x="0" y="150" width="440" height="98" fill="url(#dGround)"/>
      <circle cx="92" cy="66" r="40" fill="url(#dSun)"/>
      <rect x="178" y="104" width="64" height="86" fill="url(#dPurple)"/>
      <rect x="300" y="78" width="86" height="112" fill="url(#dRed)"/>
    </g>
    <!-- carried highlighted region -->
    <rect x="330" y="106.3" width="36.7" height="35.4" fill="none" stroke="#78b4ff" stroke-width="2.5"/>
  </svg>
  <rect x="1096" y="250" width="440" height="248" fill="none" stroke="#2a2a30" stroke-width="1.5"/>

  <!-- ============================ panel captions ============================ -->
  <text x="284"  y="524" fill="#ece8df" font-size="19" font-weight="300" text-anchor="middle">One video frame</text>
  <text x="800"  y="524" fill="#ece8df" font-size="19" font-weight="300" text-anchor="middle">A sampling grid reads each region's color</text>
  <text x="1316" y="524" fill="#ece8df" font-size="19" font-weight="300" text-anchor="middle">Each region becomes a cluster of points</text>

  <text x="284"  y="548" fill="#6b665e" font-size="13" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace">reference frame 1920 × 1080</text>
  <text x="800"  y="548" fill="#6b665e" font-size="13" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace">illustrative grid — actual default 417 × 235 regions</text>
  <text x="1316" y="548" fill="#6b665e" font-size="13" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace">points share the region color</text>

  <!-- ============================ "one region → seven points" callout ============================ -->
  <!-- leader from panel-3 highlighted region to the zoom bubble -->
  <line x1="1444" y1="392" x2="1410" y2="590" stroke="#4d7fe0" stroke-width="1.4" stroke-dasharray="4 4"/>
  <circle cx="1380" cy="662" r="74" fill="#0f0f12" stroke="#4d7fe0" stroke-width="1.5"/>
  <!-- exactly seven points, in the highlighted region's color (red) -->
  <g fill="#d8493a">
    <circle cx="1380" cy="662" r="10"/>
    <circle cx="1416" cy="662" r="10"/>
    <circle cx="1398" cy="693" r="10"/>
    <circle cx="1362" cy="693" r="10"/>
    <circle cx="1344" cy="662" r="10"/>
    <circle cx="1362" cy="631" r="10"/>
    <circle cx="1398" cy="631" r="10"/>
  </g>
  <text x="1380" y="770" fill="#9a948a" font-size="15" font-weight="300" text-anchor="middle">One sampled region becomes seven points</text>
  <text x="1380" y="792" fill="#6b665e" font-size="13" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace">default 7 per region · adjustable 1–8</text>

  <!-- ============================ footer (technical register) ============================ -->
  <line x1="64" y1="824" x2="1056" y2="824" stroke="#1d1d20" stroke-width="1"/>
  <text x="64" y="852" fill="#9a948a" font-size="16" font-weight="300">685,965 points by default — 417 × 235 sampled regions × 7 points per region.</text>
  <text x="64" y="876" fill="#6b665e" font-size="13.5" font-weight="300">The browser version uses lower density for real-time performance. A renderer — not a filter, not AI, not a physics simulation.</text>

</svg>
